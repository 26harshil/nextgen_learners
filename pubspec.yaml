name: nextgen_learners
description: A new Flutter project.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  http: ^1.2.2
  flutter_tts: ^4.0.2
  google_fonts: 6.3.0
  flutter_animate:
  haptic_feedback: ^0.2.0
  flutter_native_splash:
  audioplayers: 6.5.0
  shared_preferences: ^2.5.3 
  url_launcher: ^6.2.1
  font_awesome_flutter: ^10.1.0
  share_plus: ^11.1.0
  package_info_plus: 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: 

flutter:
  uses-material-design: true

  assets:
    - assets/home_screen/
    - assets/fonts/
    - assets/sounds/
    - assets/badges/

  fonts:
    - family: Baloo2
      fonts:
        - asset: assets/fonts/static/Baloo2-Bold.ttf
          weight: 700
        - asset: assets/fonts/static/Baloo2-Medium.ttf
          weight: 500
        - asset: assets/fonts/static/Baloo2-Regular.ttf
          weight: 400
        - asset: assets/fonts/static/Baloo2-SemiBold.ttf
          weight: 600
